{% extends "base.html" %}

{% block title %}Signup{% endblock title %}

{% block content %}

<h1>Signup</h1>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Signup</button>
    <a href="{% url 'login' %}">Already have account ?</a>
</form>

{% endblock content %}
